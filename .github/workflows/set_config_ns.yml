name: Deploy namespaces IBM Cloud
on:
  workflow_dispatch:

env:
  IBM_CLOUD_REGION: eu-es  
  CLUSTER_NAME: ez-ibm-openshift-vpc

jobs:
  deploy-k8s:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install IBM Cloud CLI & plugins
      run: |
        curl -fsSL https://clis.cloud.ibm.com/install/linux | sh
        ibmcloud plugin install container-service -f
    
    - name: Install OpenShift CLI (oc)
      run: |
        curl -LO https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux.tar.gz
        tar -xvzf openshift-client-linux.tar.gz
        chmod +x oc kubectl
        sudo mv oc kubectl /usr/local/bin/
        oc version

    - name: Login to IBM Cloud
      run: |
        ibmcloud login --apikey ${{ secrets.IBM_CLOUD_API_KEY }} -r ${{ env.IBM_CLOUD_REGION }}

    - name: Set kubeconfig for IKS
      run: |
        ibmcloud ks cluster config --cluster ${{ env.CLUSTER_NAME }} --admin

    - name: Deploy manifests to IKS
      run: |
        oc apply -R -f .
      working-directory: ./k8s
