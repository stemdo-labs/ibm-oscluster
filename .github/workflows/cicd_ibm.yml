name: IBM CLUSTER · Plan/Apply
run-name: IBM CLUSTER · ${{ github.event.inputs.action }}

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Acción a ejecutar'
        required: true
        type: choice
        options:
          - plan
          - plan/apply
  # pull_request:
  #   types: [opened, synchronize, closed]
  #   paths:
  #     - 'terraform.tfvars'

permissions:
  contents: read
  pull-requests: write
  id-token: write
  issues: write

jobs:
  terraform:
    name: Terraform Plan & Apply
    uses: ./.github/workflows/terraform_ibm_reusable.yml
    with:
      terraform_version: "1.5.7"
      var_files: '["terraform.tfvars"]'
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
      ibm_api_key: ${{ secrets.IBM_CLOUD_API_KEY }}
      hmac_access_key: ${{ secrets.HMAC_ACCESS_KEY }}
      hmac_secret_access_key: ${{ secrets.HMAC_SECRET_KEY }}
